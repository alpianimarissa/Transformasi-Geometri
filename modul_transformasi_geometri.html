<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transformasi Geometri — Modul Belajar Interaktif</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<style>
:root{
  --navy-1:#12163A;
  --navy-2:#1E2456;
  --grid-line: rgba(255,255,255,0.055);
  --paper:#FAF6EC;
  --paper-dark:#EFE7D2;
  --ink:#211C15;
  --ink-soft:#5B5546;
  --cream:#F5F1E6;
  --translasi:#E39A2D;
  --translasi-bg:#FBE9CC;
  --refleksi:#7A6AE0;
  --refleksi-bg:#E6E1FB;
  --rotasi:#E0574B;
  --rotasi-bg:#FBDEDA;
  --dilatasi:#2CA592;
  --dilatasi-bg:#D6F0EA;
  --radius:22px;
  --shadow: 0 20px 50px -20px rgba(0,0,0,0.45);
}
*{box-sizing:border-box;}

html, body {
  min-height: 100vh;
  height: auto;
}
body{
  margin:0;
  font-family:'Plus Jakarta Sans', sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 15% 10%, rgba(122,106,224,0.20), transparent 45%),
    radial-gradient(circle at 85% 90%, rgba(227,154,45,0.15), transparent 45%),
    linear-gradient(160deg, var(--navy-1), var(--navy-2));
  display:flex;
  flex-direction: column;
  align-items:center;
  justify-content:flex-start; /* Mulai dari atas agar scroll alami ke bawah */
  padding:24px 16px;
  overflow-x:hidden;
  overflow-y:auto;
}
body::before{
  content:"";
  position:fixed; inset:0;
  background-image:
    linear-gradient(var(--grid-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
  background-size:34px 34px;
  pointer-events:none;
  z-index:0;
}

#app{
  position:relative;
  z-index:1;
  width:100%;
  max-width:960px;
  height: auto; /* Hilangkan batasan tinggi tetap */
  display:flex;
  flex-direction:column;
  background:linear-gradient(180deg, #191E48, #12163A);
  border-radius:28px;
  box-shadow:var(--shadow);
  border:1px solid rgba(255,255,255,0.08);
  margin-bottom:40px; /* Jarak aman di bagian bawah halaman */
}

/* topbar */
#topbar{
  display:flex;
  align-items:center;
  gap:14px;
  padding:20px 24px 14px;
  color:var(--cream);
  flex-shrink:0;
}
#mascot-mini{width:40px;height:40px;flex-shrink:0;}
#topbar-text{flex:1; min-width:0;}
#topbar-title{
  font-family:'Space Grotesk', sans-serif;
  font-weight:700;
  font-size:15.5px;
  letter-spacing:0.02em;
}
#topbar-sub{
  font-family:'IBM Plex Mono', monospace;
  font-size:11px;
  color:rgba(245,241,230,0.55);
  margin-top:2px;
}
#toc-btn{
  background:rgba(245,241,230,0.1);
  border:1px solid rgba(245,241,230,0.18);
  color:var(--cream);
  border-radius:12px;
  padding:9px 12px;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:12.5px;
  font-weight:600;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:6px;
  flex-shrink:0;
}
#toc-btn:hover{background:rgba(245,241,230,0.18);}
#progress-track{
  height:5px;
  background:rgba(255,255,255,0.08);
  margin:0 24px;
  border-radius:3px;
  overflow:hidden;
  flex-shrink:0;
}
#progress-fill{
  height:100%;
  background:linear-gradient(90deg, var(--dilatasi), var(--translasi));
  border-radius:3px;
  transition:width .4s ease;
}

#stage-wrap{
  margin:20px 24px;
  background:
    linear-gradient(var(--grid-line-paper) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-line-paper) 1px, transparent 1px),
    var(--paper);
  background-size:26px 26px;
  background-color:var(--paper);
  border-radius:var(--radius);
  overflow:visible; /* Biarkan konten memanjang ke bawah secara utuh */
  position:relative;
  box-shadow: inset 0 2px 0 rgba(255,255,255,0.6), 0 10px 30px -12px rgba(0,0,0,0.5);
}
#stage-wrap{ --grid-line-paper: rgba(30,41,59,0.055); }
#stage{
  padding:32px 32px 42px;
  animation:pageIn .35s ease;
  height: auto;
}
@keyframes pageIn{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}
@media (prefers-reduced-motion: reduce){
  #stage{animation:none;}
}

/* nav bar */
#navbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:16px 24px 24px;
  flex-shrink:0;
  border-top: 1px solid rgba(255, 255, 255, 0.05);
}
.nav-btn{
  font-family:'Plus Jakarta Sans', sans-serif;
  font-weight:700;
  font-size:13.5px;
  border:none;
  border-radius:14px;
  padding:12px 22px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:8px;
  transition:transform .15s ease, opacity .15s ease;
}
.nav-btn:active{transform:scale(0.96);}
.nav-btn:disabled{opacity:0.3; cursor:not-allowed;}
#prev-btn{background:rgba(245,241,230,0.1); color:var(--cream); border:1px solid rgba(245,241,230,0.18);}
#prev-btn:not(:disabled):hover{background:rgba(245,241,230,0.18);}
#next-btn{background:linear-gradient(135deg, var(--translasi), #F0BD6C); color:#2B1C05;}
#next-btn:not(:disabled):hover{filter:brightness(1.06);}
#page-count{
  font-family:'IBM Plex Mono', monospace;
  color:rgba(245,241,230,0.6);
  font-size:12px;
  white-space:nowrap;
}

/* ===== content typography ===== */
.eyebrow{
  display:inline-flex;
  align-items:center;
  gap:8px;
  font-family:'IBM Plex Mono', monospace;
  font-size:11.5px;
  font-weight:600;
  letter-spacing:0.06em;
  text-transform:uppercase;
  padding:5px 12px;
  border-radius:100px;
  margin-bottom:14px;
}
h1.page-title{
  font-family:'Space Grotesk', sans-serif;
  font-size:clamp(22px, 4vw, 30px);
  font-weight:700;
  margin:0 0 14px;
  line-height:1.25;
  color:var(--ink);
}
h2.section-title{
  font-family:'Space Grotesk', sans-serif;
  font-size:18px;
  font-weight:700;
  margin:22px 0 10px;
  color:var(--ink);
}
p, li{font-size:15px; line-height:1.7; color:var(--ink-soft);}
strong{color:var(--ink);}
.lead{font-size:16.5px; color:var(--ink); line-height:1.75;}
.card{
  background:#fff;
  border:1px solid rgba(30,41,59,0.08);
  border-radius:16px;
  padding:18px 20px;
  margin:14px 0;
  box-shadow:0 8px 22px -14px rgba(30,20,5,0.25);
}
.badge{
  display:inline-block;
  font-family:'IBM Plex Mono', monospace;
  font-size:11px;
  font-weight:600;
  padding:4px 10px;
  border-radius:100px;
}
.grid-2{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
.grid-4{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
@media (max-width:600px){.grid-2{grid-template-columns:1fr;} .grid-4{grid-template-columns:1fr;}}
.center{text-align:center;}
.small-note{font-size:12.5px; color:#8A8272; font-style:italic;}
.formula-box{
  background:var(--navy-1);
  color:var(--cream);
  border-radius:14px;
  padding:16px 20px;
  font-size:16px;
  overflow-x:auto;
  margin:14px 0;
}
.katex{color:inherit;}

.opt-btn{
  display:block;
  width:100%;
  text-align:left;
  background:#fff;
  border:2px solid rgba(30,41,59,0.12);
  border-radius:12px;
  padding:11px 15px;
  margin:8px 0;
  font-family:'Plus Jakarta Sans', sans-serif;
  font-size:14.5px;
  color:var(--ink);
  cursor:pointer;
  transition:border-color .15s, background .15s;
}
.opt-btn:hover:not(:disabled){border-color:var(--translasi); background:var(--translasi-bg);}
.opt-btn.correct{border-color:var(--dilatasi); background:var(--dilatasi-bg); font-weight:700;}
.opt-btn.wrong{border-color:var(--rotasi); background:var(--rotasi-bg);}
.opt-btn.disabled{cursor:default;}
.feedback{margin-top:10px; padding:12px 14px; border-radius:10px; font-size:14px; font-weight:600;}
.feedback.ok{background:var(--dilatasi-bg); color:#155F52;}
.feedback.no{background:var(--rotasi-bg); color:#8C2C22;}
.mcq{margin:16px 0;}
.mcq-q{font-weight:700; color:var(--ink); font-size:15px; margin-bottom:8px;}

.reveal-btn{
  background:var(--navy-1); color:var(--cream); border:none; border-radius:100px;
  padding:10px 18px; font-weight:700; font-size:13px; cursor:pointer; margin:10px 0;
}
.reveal-box{
  background:var(--paper-dark);
  border-left:4px solid var(--translasi);
  padding:14px 18px;
  border-radius:8px;
  margin-top:10px;
  animation:pageIn .3s ease;
}

.demo-controls{display:flex; flex-wrap:wrap; gap:8px; margin:14px 0;}
.chip{
  font-family:'IBM Plex Mono', monospace;
  font-size:13px; font-weight:600;
  border:2px solid rgba(30,41,59,0.15);
  background:#fff;
  border-radius:10px;
  padding:8px 14px;
  cursor:pointer;
}
.chip.active{color:#fff;}
.plane-wrap{display:flex; gap:24px; flex-wrap:wrap; align-items:flex-start; margin-top:12px;}

.plane-svg{
  width:100%;
  max-width:270px;
  height:auto; 
  aspect-ratio: 1/1;
  flex-shrink:0; 
  background:#fff; 
  border-radius:14px; 
  border:1px solid rgba(30,41,59,0.08);
}
.table-wrap{
  flex:1;
  min-width:240px;
  overflow-x:auto;
}
table.coord-table{border-collapse:collapse; font-family:'IBM Plex Mono', monospace; font-size:13.5px; width:100%; min-width:220px;}
table.coord-table th, table.coord-table td{border:1px solid rgba(30,41,59,0.12); padding:7px 12px; text-align:center;}
table.coord-table th{background:var(--paper-dark);}

.progress-pill{
  display:inline-flex; align-items:center; gap:8px;
  background:var(--paper-dark); border-radius:100px; padding:6px 14px;
  font-family:'IBM Plex Mono',monospace; font-size:12.5px; font-weight:600; color:var(--ink);
  margin-top:10px;
}

/* TOC drawer */
#toc-overlay{
  position:fixed; inset:0; background:rgba(10,12,30,0.55);
  display:none; z-index:100; backdrop-filter:blur(2px);
}
#toc-overlay.open{display:block;}
#toc-panel{
  position:absolute; top:0; right:0; bottom:0; width:min(320px, 82%);
  background:var(--navy-2); padding:22px 18px; overflow-y:auto;
  box-shadow:-10px 0 30px rgba(0,0,0,0.4);
  transform:translateX(100%); transition:transform .28s ease;
}
#toc-overlay.open #toc-panel{transform:translateX(0);}
#toc-panel h3{color:var(--cream); font-family:'Space Grotesk',sans-serif; margin:0 0 14px; font-size:16px;}
.toc-item{
  display:flex; gap:10px; align-items:center; padding:9px 10px; border-radius:10px;
  cursor:pointer; color:rgba(245,241,230,0.85); font-size:13px; margin-bottom:2px;
}
.toc-item:hover{background:rgba(255,255,255,0.08);}
.toc-item.current{background:rgba(227,154,45,0.22); color:#fff; font-weight:700;}
.toc-num{font-family:'IBM Plex Mono',monospace; font-size:11px; opacity:0.6; width:20px; flex-shrink:0;}
.toc-dot{width:8px; height:8px; border-radius:50%; flex-shrink:0;}
.toc-close{
  background:rgba(255,255,255,0.1); border:none; color:var(--cream); border-radius:10px;
  padding:8px 12px; float:right; cursor:pointer; font-weight:700;
}

/* origin/final touches */
.hero-illustration{display:flex; justify-content:center; margin:6px 0 18px;}
.two-col{display:flex; gap:22px; flex-wrap:wrap; align-items:center;}
.two-col > div{flex:1; min-width:220px;}
input[type=text].name-input{
  font-family:'Space Grotesk',sans-serif; font-size:18px; font-weight:700;
  border:none; border-bottom:2.5px dashed var(--translasi); background:transparent;
  padding:6px 4px; width:100%; color:var(--ink); text-align:center;
}
input[type=text].name-input:focus{outline:none; border-color:var(--rotasi);}
textarea.journal{
  width:100%; min-height:90px; border-radius:12px; border:1.5px solid rgba(30,41,59,0.15);
  padding:12px 14px; font-family:'Plus Jakarta Sans',sans-serif; font-size:14px; resize:vertical;
}
.check-row{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 0; border-bottom:1px solid rgba(30,41,59,0.08);}
.face-btn{border:2px solid rgba(30,41,59,0.15); background:#fff; border-radius:10px; padding:6px 10px; cursor:pointer; font-size:16px;}
.face-btn.active{border-color:var(--translasi); background:var(--translasi-bg);}
</style>
</head>
<body>

<div id="app">
  <div id="topbar">
    <div id="mascot-mini"></div>
    <div id="topbar-text">
      <div id="topbar-title">Transformasi Geometri</div>
      <div id="topbar-sub" id="topbar-section">Pembukaan</div>
    </div>
    <button id="toc-btn" onclick="toggleTOC(true)">☰ Daftar Isi</button>
  </div>
  <div id="progress-track"><div id="progress-fill" style="width:0%"></div></div>

  <div id="stage-wrap">
    <div id="stage"></div>
  </div>

  <div id="navbar">
    <button class="nav-btn" id="prev-btn" onclick="prevPage()">← Sebelumnya</button>
    <div id="page-count">1 / 35</div>
    <button class="nav-btn" id="next-btn" onclick="nextPage()">Berikutnya →</button>
  </div>

  <div id="toc-overlay" onclick="if(event.target===this)toggleTOC(false)">
    <div id="toc-panel">
      <button class="toc-close" onclick="toggleTOC(false)">✕ Tutup</button>
      <h3>Daftar Isi</h3>
      <div id="toc-list"></div>
    </div>
  </div>
</div>

<script>
const qState = {};       // jawaban kuis: {selected}
const revealState = {};  // toggle pembahasan
const demoState = {
  translasi:{a:3,b:2},
  refleksi:{mode:'x'},
  rotasi:{sudut:90},
  dilatasi:{k:2},
};
const selfCheck = {translasi:null, refleksi:null, rotasi:null, dilatasi:null};
let journalText = "";
let studentName = "";

function scoreOf(prefix){
  let correct=0, total=0, answered=0;
  Object.keys(qState).forEach(k=>{
    if(k.startsWith(prefix)){
      total++;
      answered++;
      if(qState[k].correct) correct++;
    }
  });
  return {correct, answered, total};
}

/* ============ MASCOT (origami, facet 3D-style) ============ */
function mascotSVG(size=64, extra=''){
  return `<svg viewBox="0 0 120 120" width="${size}" height="${size}" style="${extra}">
    <polygon points="60,10 100,70 60,58" fill="#E39A2D"/>
    <polygon points="60,10 20,70 60,58" fill="#F0BD6C"/>
    <polygon points="60,58 100,70 66,110 34,110 20,70" fill="#D98429"/>
    <polygon points="60,58 34,110 20,70" fill="#C97317"/>
    <polygon points="60,58 66,110 100,70" fill="#F2A93B"/>
    <polygon points="46,46 54,58 40,58" fill="#211C15" opacity="0.75"/>
  </svg>`;
}
function isoCube(x,y,s,color1,color2,color3){
  return `<g transform="translate(${x},${y})">
    <polygon points="0,0 ${s},${-s*0.55} ${2*s},0 ${s},${s*0.55}" fill="${color1}"/>
    <polygon points="0,0 ${s},${s*0.55} ${s},${s*1.6} 0,${s*1.05}" fill="${color2}"/>
    <polygon points="${2*s},0 ${s},${s*0.55} ${s},${s*1.6} ${2*s},${s*1.05}" fill="${color3}"/>
  </g>`;
}

function plane({points, image=null, range=6, mirror=null, rays=false, accent='#E39A2D', showAxesLabel=true}){
  const size=260, cx=size/2, cy=size/2;
  const scale=(size-36)/(2*range);
  const X=x=>cx+x*scale, Y=y=>cy-y*scale;
  let grid='';
  for(let i=-range;i<=range;i++){
    grid+=`<line x1="${X(i)}" y1="${Y(-range)}" x2="${X(i)}" y2="${Y(range)}" stroke="rgba(30,41,59,0.09)"/>`;
    grid+=`<line x1="${X(-range)}" y1="${Y(i)}" x2="${X(range)}" y2="${Y(i)}" stroke="rgba(30,41,59,0.09)"/>`;
  }
  const axes=`<line x1="${X(-range)}" y1="${Y(0)}" x2="${X(range)}" y2="${Y(0)}" stroke="#211C15" stroke-width="1.6"/>
              <line x1="${X(0)}" y1="${Y(-range)}" x2="${X(0)}" y2="${Y(range)}" stroke="#211C15" stroke-width="1.6"/>`;
  let mirrorLine='';
  if(mirror==='x') mirrorLine=`<line x1="${X(-range)}" y1="${Y(0)}" x2="${X(range)}" y2="${Y(0)}" stroke="#7A6AE0" stroke-width="2.4" stroke-dasharray="6 4"/>`;
  if(mirror==='y') mirrorLine=`<line x1="${X(0)}" y1="${Y(-range)}" x2="${X(0)}" y2="${Y(range)}" stroke="#7A6AE0" stroke-width="2.4" stroke-dasharray="6 4"/>`;
  if(mirror==='yx') mirrorLine=`<line x1="${X(-range)}" y1="${Y(-range)}" x2="${X(range)}" y2="${Y(range)}" stroke="#7A6AE0" stroke-width="2.4" stroke-dasharray="6 4"/>`;
  if(mirror==='y-x') mirrorLine=`<line x1="${X(-range)}" y1="${Y(range)}" x2="${X(range)}" y2="${Y(-range)}" stroke="#7A6AE0" stroke-width="2.4" stroke-dasharray="6 4"/>`;
  if(mirror==='o') mirrorLine=`<circle cx="${X(0)}" cy="${Y(0)}" r="5" fill="#7A6AE0"/>`;
  let raysHtml='';
  if(rays){
    points.forEach(p=>{
      raysHtml+=`<line x1="${X(0)}" y1="${Y(0)}" x2="${X(p[0])}" y2="${Y(p[1])}" stroke="#2CA592" stroke-width="1.2" stroke-dasharray="3 3"/>`;
    });
  }
  const poly=points.map(p=>`${X(p[0])},${Y(p[1])}`).join(' ');
  let imgPoly='';
  if(image){
    const ip=image.map(p=>`${X(p[0])},${Y(p[1])}`).join(' ');
    imgPoly=`<polygon points="${ip}" fill="${accent}30" stroke="${accent}" stroke-width="2.6"/>`;
    image.forEach(p=>{imgPoly+=`<circle cx="${X(p[0])}" cy="${Y(p[1])}" r="3.2" fill="${accent}"/>`;});
  }
  let ptDots='';
  points.forEach(p=>{ptDots+=`<circle cx="${X(p[0])}" cy="${Y(p[1])}" r="3.2" fill="#211C15"/>`;});
  return `<svg class="plane-svg" viewBox="0 0 ${size} ${size}">
    ${grid}${axes}${raysHtml}${mirrorLine}
    <polygon points="${poly}" fill="#21181">
    </polygon>
    <polygon points="${poly}" fill="rgba(33,28,21,0.12)" stroke="#211C15" stroke-width="2.4"/>
    ${ptDots}${imgPoly}
  </svg>`;
}
function coordTable(labels, before, after){
  let rows = before.map((p,i)=>`<tr><td>${labels[i]}(${p[0]}, ${p[1]})</td><td>→</td><td>${labels[i]}'(${after[i][0]}, ${after[i][1]})</td></tr>`).join('');
  return `<div class="table-wrap"><table class="coord-table"><thead><tr><th>Titik Asal</th><th></th><th>Bayangan</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

/* ============ MCQ HELPER ============ */
function mcq(qid, question, options, correctIdx, explain){
  const state = qState[qid];
  const answered = !!state;
  const opts = options.map((opt,i)=>{
    let cls='opt-btn';
    if(answered){
      cls += ' disabled';
      if(i===correctIdx) cls+=' correct';
      else if(i===state.selected) cls+=' wrong';
    }
    return `<button class="${cls}" data-qid="${qid}" data-idx="${i}" data-correct="${correctIdx}" ${answered?'disabled':''}>${String.fromCharCode(65+i)}. ${opt}</button>`;
  }).join('');
  let fb='';
  if(answered){
    const ok = state.selected===correctIdx;
    fb=`<div class="feedback ${ok?'ok':'no'}">${ok?'✅ Tepat sekali!':'❌ Belum tepat.'} ${explain}</div>`;
  }
  return `<div class="mcq"><p class="mcq-q">${question}</p><div class="mcq-opts">${opts}</div>${fb}</div>`;
}

/* ============ SECTION META ============ */
const SECTIONS = {
  intro:{label:'Pembukaan', color:'#F5F1E6', dot:'#B9B39F'},
  warmup:{label:'Warm-up', color:'#E39A2D', dot:'#E39A2D'},
  connect:{label:'Dunia Nyata', color:'#2CA592', dot:'#2CA592'},
  concept:{label:'Materi', color:'#7A6AE0', dot:'#7A6AE0'},
  practice:{label:'Latihan Soal', color:'#E0574B', dot:'#E0574B'},
  closing:{label:'Penutup', color:'#F5F1E6', dot:'#B9B39F'},
};

/* ============ PAGE CONTENT ============ */

/* ---- 18. REFLEKSI VISUAL ---- */
const reflFormula = {x:'(x,y)\\to(x,-y)', y:'(x,y)\\to(-x,y)', yx:'(x,y)\\to(y,x)', 'y-x':'(x,y)\\to(-y,-x)', o:'(x,y)\\to(-x,-y)'};
function reflect(p, mode){
  const [x,y]=p;
  if(mode==='x') return [x,-y];
  if(mode==='y') return [-x,y];
  if(mode==='yx') return [y,x];
  if(mode==='y-x') return [-y,-x];
  if(mode==='o') return [-x,-y];
  return p;
}

/* ---- 21. ROTASI VISUAL ---- */
function rotate(p, deg){
  const [x,y]=p;
  if(deg===90) return [-y,x];
  if(deg===180) return [-x,-y];
  if(deg===270) return [y,-x];
  return p;
}
const rotFormula = {90:'(x,y)\\to(-y,x)', 180:'(x,y)\\to(-x,-y)', 270:'(x,y)\\to(y,-x)'};

/* ============ RENDER ENGINE ============ */
let current = 0;
function render(){
  const p = pages[current];
  const stage = document.getElementById('stage');
  stage.innerHTML = p.render();
  if(p.after) p.after(stage);
  if(window.renderMathInElement){
    renderMathInElement(stage, {delimiters:[
      {left:'\\[', right:'\\]', display:true},
      {left:'\\(', right:'\\)', display:false}
    ]});
  }
  document.getElementById('progress-fill').style.width = ((current+1)/pages.length*100)+'%';
  document.getElementById('page-count').textContent = (current+1)+' / '+pages.length;
  document.getElementById('topbar-section').textContent = SECTIONS[p.section].label + ' · ' + p.title;
  document.getElementById('prev-btn').disabled = current===0;
  document.getElementById('next-btn').disabled = current===pages.length-1;
  document.getElementById('next-btn').innerHTML = current===pages.length-1 ? 'Selesai ✓' : 'Berikutnya →';
  document.getElementById('mascot-mini').innerHTML = mascotSVG(40);
  
  // Mengarahkan jendela scroll ke atas dengan halus agar transisi halaman terasa nyaman
  window.scrollTo({ top: 0, behavior: 'smooth' });
  
  buildTOC();
}
function nextPage(){ if(current<pages.length-1){current++; render();} }
function prevPage(){ if(current>0){current--; render();} }
function goTo(i){ current=i; render(); toggleTOC(false); }

document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight') nextPage();
  if(e.key==='ArrowLeft') prevPage();
});

document.getElementById('stage-wrap').addEventListener('click', e=>{
  const btn = e.target.closest('.opt-btn');
  if(btn && !btn.disabled){
    const qid=btn.dataset.qid, idx=+btn.dataset.idx, correct=+btn.dataset.correct;
    if(!qState[qid]){
      qState[qid]={selected:idx, correct: idx===correct};
      render();
    }
  }
});

function toggleReveal(key){ revealState[key]=!revealState[key]; render(); }
function setDemo(topic,key,val){ demoState[topic][key]=val; render(); }
function setSelfCheck(k,val){ selfCheck[k] = (selfCheck[k]===val) ? null : val; render(); }

function toggleTOC(open){
  document.getElementById('toc-overlay').classList.toggle('open', open);
}
function buildTOC(){
  const list = document.getElementById('toc-list');
  list.innerHTML = pages.map((p,i)=>`
    <div class="toc-item ${i===current?'current':''}" onclick="goTo(${i})">
      <span class="toc-num">${String(i+1).padStart(2,'0')}</span>
      <span class="toc-dot" style="background:${SECTIONS[p.section].dot}"></span>
      <span>${p.title}</span>
    </div>`).join('');
}

window.addEventListener('DOMContentLoaded', render);
</script>
